
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --pk:#e0177a;--pk2:#ff4fa0;--pk3:#ffadd8;
  --pu:#7b1fa2;--pu2:#ab47bc;--pu3:#ce93d8;
  --bg:#0b0614;--bg2:#130a20;--bg3:#1a0d2b;
  --glass:rgba(155,30,180,0.07);
  --gb:rgba(224,23,122,0.28);
  --text:#f3e8ff;--muted:#a07ab0;--dim:#6a4f7a;
}
body{font-family:'Rajdhani',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 65% 55% at 5% 5%,rgba(123,31,162,0.2) 0%,transparent 60%),
  radial-gradient(ellipse 55% 45% at 95% 95%,rgba(224,23,122,0.15) 0%,transparent 60%),
  radial-gradient(ellipse 35% 35% at 50% 15%,rgba(171,71,188,0.08) 0%,transparent 60%)}
body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(224,23,122,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(123,31,162,0.03) 1px,transparent 1px);
  background-size:50px 50px}

.wrap{position:relative;z-index:1;padding:0 1rem 3rem}

/* TOP BAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.5rem;border-bottom:1px solid rgba(224,23,122,0.2);margin-bottom:0;background:rgba(11,6,20,0.85);backdrop-filter:blur(20px);position:sticky;top:0;z-index:50}
.logo{font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:900;letter-spacing:5px;background:linear-gradient(135deg,var(--pu2),var(--pk),var(--pk2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.top-badge{font-size:.65rem;letter-spacing:2px;padding:.25rem .9rem;border-radius:50px;background:rgba(224,23,122,0.12);border:1px solid rgba(224,23,122,0.35);color:var(--pk2);text-transform:uppercase;font-weight:700}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:1px solid rgba(224,23,122,0.2);margin-bottom:2rem;padding-top:1.5rem}
.tab{padding:.65rem 1.5rem;font-family:'Rajdhani',sans-serif;font-size:.85rem;font-weight:700;letter-spacing:2px;text-transform:uppercase;cursor:pointer;border:none;background:transparent;color:var(--muted);border-bottom:2px solid transparent;transition:.25s;margin-bottom:-1px}
.tab.on{color:var(--pk2);border-bottom-color:var(--pk)}
.tab:hover:not(.on){color:var(--pu3)}

/* SEARCH + FILTER BAR */
.bar{display:flex;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap;align-items:center}
.search-wrap{flex:1;min-width:180px;position:relative}
.search-wrap input{width:100%;padding:.6rem 1rem .6rem 2.2rem;background:rgba(255,255,255,0.04);border:1px solid rgba(224,23,122,0.25);border-radius:8px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:.9rem;outline:none;transition:.2s}
.search-wrap input:focus{border-color:rgba(224,23,122,0.6);background:rgba(224,23,122,0.06)}
.search-wrap input::placeholder{color:var(--dim)}
.search-icon{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem;pointer-events:none}
.filter-select{padding:.6rem .9rem;background:rgba(123,31,162,0.1);border:1px solid rgba(123,31,162,0.35);border-radius:8px;color:var(--pu3);font-family:'Rajdhani',sans-serif;font-size:.82rem;font-weight:600;outline:none;cursor:pointer;letter-spacing:1px}
.stat-pills{display:flex;gap:.5rem;flex-wrap:wrap}
.pill{font-size:.7rem;letter-spacing:1.5px;padding:.25rem .75rem;border-radius:50px;text-transform:uppercase;font-weight:700}
.pill-pk{background:rgba(224,23,122,0.12);border:1px solid rgba(224,23,122,0.3);color:var(--pk2)}
.pill-pu{background:rgba(123,31,162,0.12);border:1px solid rgba(123,31,162,0.3);color:var(--pu3)}

/* SECTION TITLE */
.sec-title{font-family:'Orbitron',monospace;font-size:.8rem;letter-spacing:3px;color:var(--pk2);text-transform:uppercase;margin-bottom:1rem;display:flex;align-items:center;gap:.6rem}
.sec-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(224,23,122,0.3),transparent)}

/* MEMBER GRID */
.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:1rem;margin-bottom:2.5rem}
.member-card{background:rgba(255,255,255,0.03);border:1px solid rgba(224,23,122,0.22);border-radius:14px;padding:1.2rem;transition:.3s;cursor:pointer;position:relative;overflow:hidden}
.member-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--pk),transparent);opacity:.6}
.member-card:hover{border-color:rgba(224,23,122,0.55);background:rgba(224,23,122,0.06);transform:translateY(-2px)}
.member-avatar{width:52px;height:52px;border-radius:50%;margin:0 auto .75rem;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:1rem;font-weight:700;position:relative;color:#fff}
.member-avatar::after{content:'';position:absolute;inset:-2px;border-radius:50%;background:conic-gradient(var(--pk),var(--pu),var(--pk));z-index:-1}
.member-name{font-family:'Orbitron',monospace;font-size:.75rem;font-weight:700;text-align:center;letter-spacing:1px;color:var(--text);margin-bottom:.2rem}
.member-handle{font-size:.75rem;color:var(--pk2);text-align:center;margin-bottom:.5rem;letter-spacing:1px}
.member-bio{font-size:.78rem;color:var(--muted);text-align:center;line-height:1.5;margin-bottom:.75rem}
.member-tags{display:flex;flex-wrap:wrap;gap:.3rem;justify-content:center}
.tag{font-size:.62rem;padding:.15rem .5rem;border-radius:4px;background:rgba(123,31,162,0.15);border:1px solid rgba(123,31,162,0.3);color:var(--pu3);letter-spacing:1px;font-weight:600}
.verified-badge{display:flex;align-items:center;justify-content:center;gap:.3rem;margin-top:.6rem;font-size:.65rem;color:#4ade80;letter-spacing:1.5px;font-weight:700}
.v-dot{width:6px;height:6px;border-radius:50%;background:#4ade80;box-shadow:0 0 6px #4ade80;flex-shrink:0}

/* LAWYER GRID */
.lawyer-list{display:grid;gap:1rem;margin-bottom:2.5rem}
.lawyer-card{background:rgba(255,255,255,0.03);border:1px solid rgba(123,31,162,0.3);border-radius:16px;padding:1.25rem;transition:.3s;position:relative;overflow:hidden}
.lawyer-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--pu2),var(--pk),transparent)}
.lawyer-card:hover{border-color:rgba(224,23,122,0.5);background:rgba(224,23,122,0.05)}
.lawyer-top{display:flex;align-items:flex-start;gap:1rem;margin-bottom:.9rem}
.l-avatar{width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:700;color:#fff;flex-shrink:0}
.l-meta{flex:1;min-width:0}
.l-name{font-family:'Orbitron',monospace;font-size:.85rem;font-weight:700;letter-spacing:1px;color:var(--text);margin-bottom:.2rem}
.l-title{font-size:.78rem;color:var(--pk2);letter-spacing:1px;margin-bottom:.3rem;font-weight:600}
.l-college{font-size:.75rem;color:var(--muted)}
.stars-row{display:flex;align-items:center;gap:.4rem;margin-top:.25rem}
.stars{display:flex;gap:1px}
.star{font-size:13px;line-height:1}
.star.on{color:#fbbf24}
.star.off{color:var(--dim)}
.rating-num{font-size:.8rem;font-weight:700;color:var(--pk2);font-family:'Orbitron',monospace}
.total-rev{font-size:.72rem;color:var(--dim)}
.l-quals{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.75rem}
.qual{font-size:.65rem;padding:.2rem .55rem;border-radius:4px;background:rgba(224,23,122,0.1);border:1px solid rgba(224,23,122,0.25);color:var(--pk3);letter-spacing:.5px}
.l-specialties{display:flex;flex-wrap:wrap;gap:.3rem;margin-bottom:.8rem}
.spec{font-size:.65rem;padding:.2rem .55rem;border-radius:4px;background:rgba(123,31,162,0.12);border:1px solid rgba(123,31,162,0.28);color:var(--pu3);letter-spacing:.5px}
.reviews{border-top:1px solid rgba(224,23,122,0.15);padding-top:.75rem}
.review-item{margin-bottom:.6rem}
.review-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:.2rem}
.reviewer{font-size:.72rem;font-weight:700;color:var(--pu3)}
.rev-date{font-size:.65rem;color:var(--dim)}
.rev-text{font-size:.78rem;color:var(--muted);line-height:1.5}
.rev-stars{display:flex;gap:1px}
.rev-star{font-size:10px}

/* FORM SECTION */
.form-card{background:rgba(255,255,255,0.03);border:1px solid rgba(224,23,122,0.3);border-radius:18px;padding:1.5rem;max-width:580px;margin:0 auto;position:relative;overflow:hidden}
.form-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--pk),var(--pu2),transparent)}
.form-title{font-family:'Orbitron',monospace;font-size:.9rem;letter-spacing:3px;color:var(--text);margin-bottom:1.2rem;text-transform:uppercase;text-align:center}
.form-row{margin-bottom:1rem}
.form-label{font-size:.72rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);font-weight:700;display:block;margin-bottom:.35rem}
.form-input{width:100%;padding:.65rem 1rem;background:rgba(255,255,255,0.04);border:1px solid rgba(224,23,122,0.2);border-radius:8px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:.9rem;outline:none;transition:.2s}
.form-input:focus{border-color:rgba(224,23,122,0.6);background:rgba(224,23,122,0.06)}
.form-input::placeholder{color:var(--dim)}
textarea.form-input{resize:vertical;min-height:80px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.75rem}
.aadhaar-note{display:flex;align-items:center;gap:.5rem;padding:.5rem .75rem;background:rgba(74,222,128,0.07);border:1px solid rgba(74,222,128,0.25);border-radius:8px;font-size:.72rem;color:#4ade80;margin-bottom:1rem;letter-spacing:1px}
.submit-btn{width:100%;padding:.9rem;background:linear-gradient(135deg,var(--pu),var(--pk));border:none;border-radius:10px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:.95rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:.3s;box-shadow:0 0 20px rgba(224,23,122,0.3);margin-top:.5rem}
.submit-btn:hover{box-shadow:0 0 35px rgba(224,23,122,0.55);transform:translateY(-1px)}
.success-msg{display:none;text-align:center;padding:1rem;background:rgba(74,222,128,0.08);border:1px solid rgba(74,222,128,0.3);border-radius:10px;color:#4ade80;font-size:.85rem;letter-spacing:1px;margin-top:.75rem;font-weight:700}

.hidden{display:none}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}.member-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}.tabs{overflow-x:auto}.tab{white-space:nowrap}}
</style>

<!-- REGISTER TAB -->
<div id="tab-register" class="hidden">
  <div class="form-card">

    <div class="aadhaar-note">

      Aadhaar verification completed — your gender is confirmed
    </div>
    <div class="form-row">
      <label class="form-label">Profile Name</label>
      <input class="form-input" type="text" placeholder="e.g. Priya Sharma" id="reg-name">
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label class="form-label">Username / Handle</label>
        <input class="form-input" type="text" placeholder="@priya.s" id="reg-handle">
      </div>
      <div class="form-row">
        <label class="form-label">City</label>
        <input class="form-input" type="text" placeholder="Mumbai" id="reg-city">
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">Bio (max 120 chars)</label>
      <textarea class="form-input" placeholder="Tell your story — like your Instagram bio..." id="reg-bio" maxlength="120"></textarea>
    </div>
    <div class="form-grid">
      <div class="form-row">
        <label class="form-label">Interests / Tags</label>
        <input class="form-input" type="text" placeholder="law, art, fitness" id="reg-tags">
      </div>
      <div class="form-row">
        <label class="form-label">Aadhaar Ref. ID</label>
        <input class="form-input" type="text" placeholder="XXXX-XXXX-5432" id="reg-aadhar" readonly style="opacity:.6;cursor:not-allowed">
      </div>
    </div>
    <button class="submit-btn" onclick="registerProfile()">Save Profile</button>
    <div class="success-msg" id="regSuccess">Profile created successfully! Find yourself in Member Profiles.</div>
  </div>
</div>

</div>
</div>

const avatarBg=(i)=>`background:linear-gradient(135deg,${AVATAR_COLORS[i%AVATAR_COLORS.length][0]},${AVATAR_COLORS[i%AVATAR_COLORS.length][1]})`;
const initials=(name)=>name.replace('Adv. ','').split(' ').slice(0,2).map(w=>w[0]).join('');
const stars=(r,total)=>{let s='';for(let i=1;i<=5;i++)s+=`<span class="star ${i<=r?'on':'off'}">&#9733;</span>`;return s;};
const miniStars=(r)=>{let s='';for(let i=1;i<=5;i++)s+=`<span class="rev-star ${i<=r?'on':'off'}" style="color:${i<=r?'#fbbf24':'#6a4f7a'}">&#9733;</span>`;return s;};

function renderMembers(list){
  const g=document.getElementById('memberGrid');
  document.getElementById('memberCount').textContent=list.length+' members';
  g.innerHTML=list.map((m,i)=>`
  <div class="member-card">
    <div class="member-avatar" style="${avatarBg(i)}">${initials(m.name)}</div>
    <div class="member-name">${m.name}</div>
    <div class="member-handle">${m.handle}</div>
    <div class="member-bio">${m.bio}</div>
    <div class="member-tags">${m.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
    <div class="member-tags" style="margin-top:.35rem"><span class="tag" style="background:rgba(74,222,128,0.08);border-color:rgba(74,222,128,0.25);color:#4ade80">${m.city}</span></div>
    <div class="verified-badge"><span class="v-dot"></span>Aadhaar Verified</div>
  </div>`).join('');
}

function filterMembers(){
  const q=document.getElementById('memberSearch').value.toLowerCase();
  const city=document.getElementById('cityFilter').value;
  renderMembers(members.filter(m=>
    (!q||(m.name+m.handle+m.bio+m.tags.join(' ')).toLowerCase().includes(q))&&
    (!city||m.city===city)
  ));
}

function renderLawyers(list){
  const g=document.getElementById('lawyerGrid');
  document.getElementById('lawyerCount').textContent=list.length+' lawyers';
  g.innerHTML=list.map((l,i)=>`
  <div class="lawyer-card">
    <div class="lawyer-top">
      <div class="l-avatar" style="${avatarBg(i+3)};border-radius:12px">${initials(l.name)}</div>
      <div class="l-meta">
        <div class="l-name">${l.name}</div>
        <div class="l-title">${l.title}</div>
        <div class="l-college">${l.college}</div>
        <div class="stars-row"><div class="stars">${stars(l.rating)}</div><span class="rating-num">${l.rating}.0</span><span class="total-rev">(${l.totalReviews} reviews)</span></div>
      </div>
    </div>
    <div class="l-quals">${l.quals.map(q=>`<span class="qual">${q}</span>`).join('')}</div>
    <div class="l-specialties">${l.specs.map(s=>`<span class="spec">${s}</span>`).join('')}</div>
    <div class="reviews">${l.reviews.map(r=>`
      <div class="review-item">
        <div class="review-header">
          <div style="display:flex;align-items:center;gap:.4rem"><span class="reviewer">${r.user}</span><div class="rev-stars">${miniStars(r.stars)}</div></div>
          <span class="rev-date">${r.date}</span>
        </div>
        <div class="rev-text">${r.text}</div>
      </div>`).join('')}</div>
  </div>`).join('');
}

function filterLawyers(){
  const q=document.getElementById('lawyerSearch').value.toLowerCase();
  const rating=document.getElementById('ratingFilter').value;
  const spec=document.getElementById('specFilter').value;
  renderLawyers(LAWYERS.filter(l=>
    (!q||(l.name+l.college+l.specs.join(' ')+l.quals.join(' ')).toLowerCase().includes(q))&&
    (!rating||l.rating===parseInt(rating))&&
    (!spec||l.specs.includes(spec))
  ));
}

function switchTab(name,el){
  ['members','lawyers','register'].forEach(t=>{
    document.getElementById('tab-'+t).classList.toggle('hidden',t!==name);
  });
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));
  el.classList.add('on');
}

function registerProfile(){
  const name=document.getElementById('reg-name').value.trim();
  const handle=document.getElementById('reg-handle').value.trim();
  const city=document.getElementById('reg-city').value.trim();
  const bio=document.getElementById('reg-bio').value.trim();
  const tags=document.getElementById('reg-tags').value.trim();
  if(!name||!handle||!bio){alert('Please fill in name, handle, and bio.');return;}
  const newMember={name,handle:handle.startsWith('@')?handle:'@'+handle,city:city||'India',bio,tags:tags?tags.split(',').map(t=>t.trim()).filter(Boolean):['hectate'],aadhar:'XXXX-XXXX-'+Math.floor(1000+Math.random()*9000)};
  members.push(newMember);
  document.getElementById('regSuccess').style.display='block';
  document.getElementById('reg-name').value='';
  document.getElementById('reg-handle').value='';
  document.getElementById('reg-city').value='';
  document.getElementById('reg-bio').value='';
  document.getElementById('reg-tags').value='';
  setTimeout(()=>{document.getElementById('regSuccess').style.display='none';},3500);
}

document.getElementById('reg-aadhar').value='XXXX-XXXX-'+Math.floor(1000+Math.random()*9000);
renderMembers(members);
renderLawyers(LAWYERS);
</script>
